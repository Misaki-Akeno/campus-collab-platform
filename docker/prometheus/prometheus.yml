global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: campus-gateway
    static_configs:
      - targets: ["host.docker.internal:9000"]
    metrics_path: /actuator/prometheus

  - job_name: campus-user-service
    static_configs:
      - targets: ["host.docker.internal:8081"]
    metrics_path: /actuator/prometheus

  - job_name: campus-club-service
    static_configs:
      - targets: ["host.docker.internal:8082"]
    metrics_path: /actuator/prometheus

  - job_name: campus-im-service
    static_configs:
      - targets: ["host.docker.internal:8083"]
    metrics_path: /actuator/prometheus

  - job_name: campus-file-service
    static_configs:
      - targets: ["host.docker.internal:8084"]
    metrics_path: /actuator/prometheus

  - job_name: campus-seckill-service
    static_configs:
      - targets: ["host.docker.internal:8085"]
    metrics_path: /actuator/prometheus
