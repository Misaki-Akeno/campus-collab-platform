name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      # =========================================================
      # 环境准备
      # =========================================================
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Set up Node.js (Bruno CLI)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bruno CLI
        run: npm install -g @usebruno/cli

      # =========================================================
      # 启动中间件
      # =========================================================
      - name: Start middleware
        run: make dev

      - name: Wait for middleware
        run: |
          echo "Waiting for MySQL..."
          until mysqladmin ping -h 127.0.0.1 --silent; do sleep 2; done
          echo "Waiting for Redis..."
          until redis-cli ping | grep -q PONG; do sleep 2; done
          echo "Waiting for Nacos..."
          timeout 120 bash -c 'until curl -sf http://localhost:8848/nacos/v1/console/health/liveness; do sleep 3; done'
          echo "Waiting for MinIO..."
          timeout 60 bash -c 'until curl -sf http://localhost:9000/minio/health/live; do sleep 3; done'
          echo "All middleware ready"

      # =========================================================
      # 准备 .env（CI 环境）
      # =========================================================
      - name: Create .env
        run: |
          cat > .env << 'EOF'
          DOCKER_REGISTRY_PREFIX=
          CAMPUS_JWT_SECRET=ci-test-jwt-secret-key-that-is-long-enough-for-hs256-signing-123456
          REDIS_HOST=127.0.0.1
          REDIS_PORT=6379
          NACOS_SERVER_ADDR=127.0.0.1:8848
          MINIO_ENDPOINT=http://127.0.0.1:9002
          MINIO_ACCESS_KEY=minioadmin
          MINIO_SECRET_KEY=minioadmin123
          MYSQL_HOST=127.0.0.1
          MYSQL_PORT=3306
          MYSQL_USERNAME=root
          MYSQL_PASSWORD=root123456
          MYSQL_DATABASE=campus_platform
          EOF

      # =========================================================
      # 编译 + 启动服务
      # =========================================================
      - name: Build services
        run: make build

      - name: Start all services
        run: make run-all

      - name: Wait for services
        run: |
          echo "Waiting for services to start..."
          for port in 9000 8081 8082 8083 8084 8085; do
            echo -n "  Port $port: "
            timeout 120 bash -c 'until curl -sf http://localhost:$port/actuator/health >/dev/null 2>&1; do sleep 3; done'
            echo "ready"
          done
          echo "All services ready"

      # =========================================================
      # 运行测试
      # =========================================================
      - name: Run unit tests
        run: make test

      - name: Run HTTP integration tests (Bruno)
        run: make http-test-ci

      # =========================================================
      # 清理（始终执行）
      # =========================================================
      - name: Cleanup
        if: always()
        run: make stop-all

      # =========================================================
      # 收集日志（失败时）
      # 使用 || true 防止日志收集失败掩盖原始错误
      # =========================================================
      - name: Upload service logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: service-logs
          path: logs/
          retention-days: 7
