name: Backend Quality Gate

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'campus-platform-backend/**'
      - 'campus-common/**'
      - 'campus-api/**'
      - 'docker/**'
      - 'tests/bruno/**'
      - 'Makefile'
      - '.github/workflows/backend-quality-gate.yml'
  push:
    branches: [main, develop]
    paths:
      - 'campus-platform-backend/**'
      - 'campus-common/**'
      - 'campus-api/**'
      - 'docker/**'
      - 'tests/bruno/**'
      - 'Makefile'
      - '.github/workflows/backend-quality-gate.yml'

permissions:
  contents: read

jobs:
  backend-quality-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Set up Node.js (Bruno CLI)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bruno CLI
        run: npm install -g @usebruno/cli

      - name: Start middleware
        run: make dev

      - name: Wait for middleware
        run: make wait-healthy WAIT_TIMEOUT=180

      - name: Create .env
        run: |
          cat > .env << 'EOF'
          DOCKER_REGISTRY_PREFIX=
          CAMPUS_JWT_SECRET=ci-test-jwt-secret-key-that-is-long-enough-for-hs256-signing-123456
          REDIS_HOST=127.0.0.1
          REDIS_PORT=6379
          NACOS_SERVER_ADDR=127.0.0.1:8848
          MINIO_ENDPOINT=http://127.0.0.1:9002
          MINIO_ACCESS_KEY=minioadmin
          MINIO_SECRET_KEY=minioadmin123
          MYSQL_HOST=127.0.0.1
          MYSQL_PORT=3306
          MYSQL_USERNAME=root
          MYSQL_PASSWORD=root123456
          MYSQL_DATABASE=campus_platform
          EOF

      - name: Build services
        run: make build

      - name: Run unit tests
        run: make test

      - name: Start all services
        run: make run-all

      - name: Wait for services
        run: make wait-services WAIT_TIMEOUT=180

      - name: Run HTTP integration tests (Bruno)
        run: make http-test-ci

      - name: Upload service logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: service-logs
          path: logs/
          retention-days: 7

      - name: Cleanup
        if: always()
        run: make stop-all
