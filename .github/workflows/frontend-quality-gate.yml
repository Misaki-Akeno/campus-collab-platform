name: Frontend Quality Gate

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'campus-platform-frontend/**'
      - '.github/workflows/frontend-quality-gate.yml'
  push:
    branches: [main, develop]
    paths:
      - 'campus-platform-frontend/**'
      - '.github/workflows/frontend-quality-gate.yml'

permissions:
  contents: read

jobs:
  frontend-quality-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: campus-platform-frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: campus-platform-frontend
        run: npm install

      - name: Run frontend lint (ESLint)
        working-directory: campus-platform-frontend
        run: npm run lint
